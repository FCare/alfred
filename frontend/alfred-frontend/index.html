<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred - Gestionnaire de listes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="header-content">
                <h1>Alfred</h1>
                <p class="header-subtitle">Gestionnaire de liste</p>
            </div>
        </header>

        <main class="app-main">
            <!-- Liste des listes -->
            <div id="lists-view" class="lists-view">
                <div id="lists-container" class="lists-container">
                    <!-- Les listes apparaîtront ici -->
                </div>
            </div>

            <!-- Vue d'une liste spécifique -->
            <div id="list-view" class="list-view" style="display: none;">
                <div class="list-header">
                    <h2 id="current-list-name">Liste</h2>
                    <div class="list-actions">
                        <button id="delete-list-btn" class="btn-icon btn-danger" title="Supprimer la liste">
                            🗑️
                        </button>
                        <button id="close-list-btn" class="btn-icon btn-success" title="Fermer">
                            ✓
                        </button>
                    </div>
                </div>
                
                <div class="list-content">
                    <div class="add-item">
                        <input type="text" id="new-item-input" placeholder="Nom de l'élément..." />
                        <input type="text" id="new-item-quantity" placeholder="Quantité (optionnel)" />
                        <input type="text" id="new-item-comment" placeholder="Commentaire (optionnel)" />
                        <input type="file" id="new-item-photo" accept="image/*" style="display: none;" />
                        <button type="button" id="photo-btn" class="btn-icon" title="Ajouter une photo">📷</button>
                        <button id="add-item-btn" class="btn btn-secondary">Ajouter</button>
                        <button id="cancel-edit-btn" class="btn btn-secondary" style="display: none;">Annuler</button>
                    </div>
                    
                    <div id="photo-preview" class="photo-preview">
                        <img id="preview-image" src="" alt="Aperçu" />
                        <div class="preview-name" id="preview-name"></div>
                    </div>
                    
                    <div id="items-container" class="items-container">
                        <!-- Les éléments apparaîtront ici -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal simple pour création de liste -->
        <div id="create-list-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Nouvelle liste</h3>
                <form id="create-list-form">
                    <input type="text" id="list-name-input" placeholder="Nom de la liste" required />
                    <select id="list-type-input" required>
                        <option value="shopping">🛒 Courses</option>
                        <option value="todo">✅ Tâches</option>
                        <option value="wishlist">🎁 Souhaits</option>
                        <option value="inventory">📦 Inventaire</option>
                    </select>
                    <div class="modal-actions">
                        <button type="button" id="cancel-create-btn" class="btn">Annuler</button>
                        <button type="submit" class="btn btn-primary">Créer</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal de visualisation d'image -->
        <div id="image-modal" class="modal image-modal" style="display: none;">
            <div class="image-modal-content">
                <button class="modal-close" onclick="listsManager.hideImageModal()">&times;</button>
                <img id="modal-image" src="" alt="Image" />
                <div class="image-info">
                    <span id="image-title"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="modules/api.js"></script>
    <script src="modules/lists.js"></script>
    <script src="modules/items.js"></script>
    <script src="script.js"></script>
</body>
</html>
