version: '3.8'

services:
  alfred-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alfred-backend
    environment:
      - DATABASE_URL=sqlite:///./alfred.db
      - VOIGHT_KAMPFF_URL=http://voight-kampff:8000
      - SECRET_KEY=your-secret-key-change-in-production
      - UPLOAD_MAX_SIZE=10485760
      - UPLOAD_ALLOWED_EXTENSIONS=jpg,jpeg,png,gif,webp
    volumes:
      - alfred_uploads:/app/uploads
      - alfred_database:/app/data
    networks:
      - ansible
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=10)"]
      interval: 30s
      timeout: 10s
      retries: 3

  alfred-frontend:
    image: nginx:alpine
    container_name: alfred-frontend
    ports:
      - "5213:80"
    volumes:
      - ./frontend/alfred-frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - alfred-backend
    networks:
      - ansible
    restart: unless-stopped

volumes:
  alfred_uploads:
    driver: local
  alfred_database:
    driver: local

networks:
  ansible:
    external: true
    driver: bridge